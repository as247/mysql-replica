services:
  db:
    image: ${MYSQL_IMAGE}
    restart: always
    ports:
      - ${MYSQL_PORT}:3306
    env_file:
      - ./mysql.env
    volumes:
      - ./mysql/data/:/var/lib/mysql
      - ./mysql/log/:/var/log/mysql
      - ./mysql/conf.d/:/etc/mysql/conf.d
      - ./mysql/init/:/docker-entrypoint-initdb.d
    networks:
      tinyinstaller:
  pma:
    image: phpmyadmin
    restart: always
    ports:
      - ${PHPMYADMIN_PORT}:80
    environment:
      - PMA_HOST=db
    networks:
      tinyinstaller:
networks:
  tinyinstaller: